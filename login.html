<!DOCTYPE html>
<html lang="te">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KisanVaani - Login</title>
  
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#1B4332">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">

  <link rel="stylesheet" href="./css/style.css">
  <script src="./js/app.js"></script>
</head>
<body>
  <nav class="navbar">
    <div class="brand">🌾 KisanVaani</div>
    <a href="./index.html" class="btn btn-outline" style="border-color:white; color:white; padding:4px 12px;">Back</a>
  </nav>

  <div class="container" style="max-width: 500px; margin-top: 40px;">
    <div class="card">
      <h2 style="margin-bottom: 20px; text-align: center;">లాగిన్</h2>
      
      <form id="login-form">
        <div class="form-group">
          <label>ఫోన్ నంబర్</label>
          <input type="tel" id="login-phone" class="form-control" required placeholder="10 అంకెల నంబర్ నమోదు చేయండి" pattern="[0-9]{10}">
        </div>
        <div class="form-group">
          <label>ఖాతా రకం</label>
          <select id="login-type" class="form-control">
            <option value="farmer">రైతు</option>
            <option value="buyer">కొనుగోలుదారు</option>
          </select>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">లాగిన్ అవ్వండి</button>
      </form>
      <p style="text-align: center; margin-top: 20px;">
        ఖాతా లేదా? <a href="./register.html" style="color: var(--primary); font-weight: bold;">నమోదు చేసుకోండి</a>
      </p>
    </div>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const type = document.getElementById('login-type').value;
      const phone = document.getElementById('login-phone').value;
      
      // In a real app we'd verify OTP, but we log in immediately here
      loginUser(phone, type, type === 'farmer' ? 'రైతు' : 'కొనుగోలుదారు', 'ఖమ్మం');
      
      const urlParams = new URLSearchParams(window.location.search);
      const redirect = urlParams.get('redirect');
      
      if(redirect) {
         window.location.href = decodeURIComponent(redirect);
      } else if (type === 'farmer') {
         window.location.href = 'farmer-dashboard.html';
      } else {
         window.location.href = 'buyer-dashboard.html';
      }
    });
  </script>
  
  <script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
  }
  </script>
</body>
</html>
