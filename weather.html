<!DOCTYPE html>
<html lang="te">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KisanVaani - Weather</title>
  
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1B4332">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">

  <link rel="stylesheet" href="css/style.css">
  <script src="js/app.js"></script>
  <script src="js/weather.js"></script>
</head>
<body>
  <nav class="navbar">
    <div class="brand">🌾 వాతావరణం</div>
    <a href="javascript:history.back()" class="btn btn-outline" style="border-color:white; color:white; padding:4px 12px;">Back</a>
  </nav>

  <!-- Open-Meteo Credits -->
  <div style="padding:10px; background:#fff; text-align:center; font-size:12px; color:var(--text-muted); border-bottom:1px solid #eee;">
    Powered by <a href="https://open-meteo.com" target="_blank" style="color:var(--primary); font-weight:bold;">Open-Meteo API</a>
  </div>

  <div class="container" style="margin-top:20px;">
    
    <div style="background: linear-gradient(135deg, #0ea5e9, #2563eb); border-radius: 20px; padding: 30px; margin-bottom: 24px; color: white;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
        <div>
          <h2 style="color:white; font-size:24px; margin-bottom:4px;">ఖమ్మం జిల్లా</h2>
          <div id="live-date" style="font-size:14px; opacity:0.9;">--</div>
        </div>
        <div id="live-clock" style="font-size:32px; font-weight:900; font-variant-numeric: tabular-nums;">--:--:--</div>
      </div>
      
      <div style="display:flex; align-items:center; gap:20px; margin-top:24px;">
        <div id="w-icon-main" style="font-size:72px; line-height:1; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.2));">🌤️</div>
        <div>
          <div style="font-size:56px; font-weight:900; line-height:1;"><span id="w-temp-main">--</span><span style="font-size:32px; font-weight:500;">°C</span></div>
          <div id="w-desc-main" style="font-size:18px; font-weight:600; margin-top:8px;">లోడ్ అవుతోంది...</div>
        </div>
      </div>
      
      <div style="display:flex; justify-content:space-between; margin-top:30px; background:rgba(255,255,255,0.2); border-radius:12px; padding:16px; backdrop-filter:blur(10px);">
        <div style="text-align:center;">
          <div style="font-size:12px; opacity:0.9;">గాలి వీచే వేగం</div>
          <div style="font-weight:700; font-size:16px; margin-top:4px;"><span id="w-wind">--</span> km/h</div>
        </div>
        <div style="text-align:center;">
          <div style="font-size:12px; opacity:0.9;">తేమ</div>
          <div style="font-weight:700; font-size:16px; margin-top:4px;"><span id="w-humidity">--</span>%</div>
        </div>
        <div style="text-align:center;">
          <div style="font-size:12px; opacity:0.9;">వర్షపాతం</div>
          <div style="font-weight:700; font-size:16px; margin-top:4px;"><span id="w-rain">--</span> mm</div>
        </div>
      </div>
    </div>

    <!-- 7 Day Forecast -->
    <h3 style="margin-bottom:16px;">వచ్చే 7 రోజుల వాతావరణం</h3>
    
    <div id="forecast-container" style="display:flex; flex-direction:column; gap:12px;">
      <div class="card" style="text-align:center;">లోడ్ అవుతోంది...</div>
    </div>

  </div>

  <button class="fab-whatsapp" onclick="window.open('https://wa.me/919059292300', '_blank')">💬</button>

  <script>
    window.renderWeather = function(data) {
      if(!data || !data.current || !data.daily) return;
      
      // Setup current
      document.getElementById('w-temp-main').innerText = Math.round(data.current.temperature_2m);
      document.getElementById('w-icon-main').innerText = WEATHER_CODES[data.current.weather_code] || '☀️';
      document.getElementById('w-desc-main').innerText = WEATHER_TE[data.current.weather_code] || 'స్పష్టమైన ఆకాశం';
      document.getElementById('w-wind').innerText = Math.round(data.current.wind_speed_10m);
      document.getElementById('w-humidity').innerText = data.current.relative_humidity_2m;
      document.getElementById('w-rain').innerText = data.current.precipitation || 0;
      
      // Setup forecast
      const daysStr = ['ఆదివారం','సోమవారం','మంగళవారం','బుధవారం','గురువారం','శుక్రవారం','శనివారం'];
      const container = document.getElementById('forecast-container');
      
      let html = '';
      for(let i=1; i<7; i++) {
        // Build future day
        const d = new Date();
        d.setDate(d.getDate() + i);
        const dayName = i === 1 ? 'రేపు' : daysStr[d.getDay()];
        
        const code = data.daily.weather_code[i];
        const icon = WEATHER_CODES[code] || '☀️';
        const min = Math.round(data.daily.temperature_2m_min[i]);
        const max = Math.round(data.daily.temperature_2m_max[i]);
        
        html += `
          <div class="card" style="padding:16px; display:flex; justify-content:space-between; align-items:center; margin-bottom:0;">
            <div style="width:100px; font-weight:bold;">${dayName}</div>
            <div style="font-size:28px;">${icon}</div>
            <div style="width:80px; text-align:right; font-weight:600;">
              ${max}° <span style="color:var(--text-muted); font-size:14px; margin-left:8px;">${min}°</span>
            </div>
          </div>
        `;
      }
      container.innerHTML = html;
    };
  </script>

  <script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js'));
  }
  </script>
</body>
</html>
