<style>
/* KisanVaani Global Styles */
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu:wght@400;500;600;700;800&display=swap');

:root {
  --primary: #1B4332;
  --primary-light: #2D6A4F;
  --secondary: #F59E0B;
  --bg-color: #F8FAFC;
  --text-main: #1E293B;
  --text-muted: #64748B;
  --white: #FFFFFF;
  --border: #E2E8F0;
  --success: #22C55E;
  --danger: #EF4444;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Noto Sans Telugu', sans-serif;
}

body {
  background-color: var(--bg-color);
  color: var(--text-main);
  line-height: 1.6;
  padding-bottom: 80px; /* Space for PWA install banner / footing */
}

/* Typography */
h1, h2, h3, h4, h5, h6 {
  color: var(--primary);
  font-weight: 700;
}

a {
  text-decoration: none;
  color: inherit;
}

/* Navbar */
.navbar {
  background: var(--primary);
  color: var(--white);
  padding: 16px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 1000;
  box-shadow: 0 4px 12px rgba(27, 67, 50, 0.2);
}

.brand {
  font-size: 22px;
  font-weight: 800;
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--white);
}

/* Utilities */
.container {
  max-width: 800px;
  margin: 0 auto;
  padding: 20px;
}

.card {
  background: var(--white);
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.05);
  margin-bottom: 20px;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 12px 24px;
  border-radius: 12px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all 0.2s ease;
  font-size: 15px;
  gap: 8px;
  text-align: center;
}

.btn-primary {
  background: var(--primary);
  color: var(--white);
}

.btn-primary:active { opacity: 0.9; transform: scale(0.98); }

.btn-secondary {
  background: var(--secondary);
  color: #000;
}

.btn-outline {
  background: transparent;
  border: 2px solid var(--primary);
  color: var(--primary);
}

.badge {
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
}
.badge-active { background: #DCFCE7; color: #166534; }
.badge-sold { background: #FEF3C7; color: #92400E; }

/* Dashboard Grids */
.grid-2 {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
}
.grid-4 {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  overflow-x: auto;
  padding-bottom: 8px;
}

/* Floating Actions */
.fab-whatsapp {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: #25D366;
  color: white;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  box-shadow: 0 4px 16px rgba(37,211,102,0.4);
  z-index: 990;
  cursor: pointer;
  border: none;
}

.fab-mic {
  position: fixed;
  bottom: 24px;
  left: 24px;
  background: var(--secondary);
  color: #000;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  box-shadow: 0 4px 16px rgba(245,158,11,0.4);
  z-index: 990;
  cursor: pointer;
  border: none;
}

/* Forms */
.form-group {
  margin-bottom: 16px;
}
.form-group label {
  display: block;
  font-weight: 600;
  margin-bottom: 8px;
  font-size: 14px;
}
.form-control {
  width: 100%;
  padding: 14px;
  border: 2px solid var(--border);
  border-radius: 12px;
  font-size: 15px;
  outline: none;
  transition: border-color 0.2s;
}
.form-control:focus {
  border-color: var(--primary);
}

/* Price ticker */
.ticker-wrap {
  background: #000;
  color: #fff;
  padding: 4px 0;
  overflow: hidden;
  position: relative;
  white-space: nowrap;
}
.ticker {
  display: inline-block;
  animation: ticker 25s linear infinite;
  font-size: 13px;
  font-weight: 600;
}
@keyframes ticker {
  0% { transform: translateX(100%); }
  100% { transform: translateX(-100%); }
}

/* Chips */
.chip {
  display: inline-flex;
  align-items: center;
  background: var(--white);
  border: 1px solid var(--primary-light);
  color: var(--primary);
  padding: 8px 16px;
  border-radius: 30px;
  font-size: 14px;
  font-weight: 600;
  white-space: nowrap;
  gap: 6px;
  cursor: pointer;
}

/* Toasts */
#toast-container {
  position: fixed;
  top: 80px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.toast {
  background: #333;
  color: #fff;
  padding: 12px 24px;
  border-radius: 8px;
  font-size: 14px;
  opacity: 0;
  animation: fadein 0.3s forwards, fadeout 0.3s forwards 2.7s;
}
@keyframes fadein { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeout { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-20px); } }

</style>

  <script>
    window.renderWeather = function(data) {
      if(!data || !data.current || !data.daily) return;
      
      // Setup current
      document.getElementById('w-temp-main').innerText = Math.round(data.current.temperature_2m);
      document.getElementById('w-icon-main').innerText = WEATHER_CODES[data.current.weather_code] || '☀️';
      document.getElementById('w-desc-main').innerText = WEATHER_TE[data.current.weather_code] || 'స్పష్టమైన ఆకాశం';
      document.getElementById('w-wind').innerText = Math.round(data.current.wind_speed_10m);
      document.getElementById('w-humidity').innerText = data.current.relative_humidity_2m;
      document.getElementById('w-rain').innerText = data.current.precipitation || 0;
      
      // Setup forecast
      const daysStr = ['ఆదివారం','సోమవారం','మంగళవారం','బుధవారం','గురువారం','శుక్రవారం','శనివారం'];
      const container = document.getElementById('forecast-container');
      
      let html = '';
      for(let i=1; i<7; i++) {
        // Build future day
        const d = new Date();
        d.setDate(d.getDate() + i);
        const dayName = i === 1 ? 'రేపు' : daysStr[d.getDay()];
        
        const code = data.daily.weather_code[i];
        const icon = WEATHER_CODES[code] || '☀️';
        const min = Math.round(data.daily.temperature_2m_min[i]);
        const max = Math.round(data.daily.temperature_2m_max[i]);
        
        html += `
          <div class="card" style="padding:16px; display:flex; justify-content:space-between; align-items:center; margin-bottom:0;">
            <div style="width:100px; font-weight:bold;">${dayName}</div>
            <div style="font-size:28px;">${icon}</div>
            <div style="width:80px; text-align:right; font-weight:600;">
              ${max}° <span style="color:var(--text-muted); font-size:14px; margin-left:8px;">${min}°</span>
            </div>
          </div>
        `;
      }
      container.innerHTML = html;
    };
  </script>

<script>
// Embedded app.js
// app.js
document.addEventListener('DOMContentLoaded', () => {
  setupNavbar();
  setupToast();
  checkAuthDisplays();
});

function setupNavbar() {
  // Mobile responsive nav behavior or login state updates
}

function showToast(message, type = 'info') {
  let container = document.getElementById('toast-container');
  if (!container) {
    container = document.createElement('div');
    container.id = 'toast-container';
    document.body.appendChild(container);
  }
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerText = message;
  
  if(type === 'success') toast.style.background = '#22C55E';
  if(type === 'error') toast.style.background = '#EF4444';
  
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

// Authentication Guards
function requireFarmerAuth() {
  const user = JSON.parse(localStorage.getItem('kv_user') || '{}');
  if (!user.isLoggedIn || user.userType !== 'farmer') {
    const current = encodeURIComponent(window.location.pathname + window.location.search);
    window.location.href = 'login.html?redirect=' + current;
  }
}

function requireBuyerAuth() {
  const user = JSON.parse(localStorage.getItem('kv_user') || '{}');
  if (!user.isLoggedIn || user.userType !== 'buyer') {
    window.location.href = 'login.html';
  }
}

function getUser() {
  return JSON.parse(localStorage.getItem('kv_user') || '{}');
}

function loginUser(phone, userType, name, village) {
  const user = {
    isLoggedIn: true,
    phone,
    userType,
    name: name || (userType === 'farmer' ? 'రైతు' : 'కొనుగోలుదారు'),
    village: village || 'ఖమ్మం'
  };
  localStorage.setItem('kv_user', JSON.stringify(user));
  showToast('లాగిన్ విజయవంతమైంది!', 'success');
}

function logoutUser() {
  localStorage.removeItem('kv_user');
  window.location.href = 'index.html';
}

function checkAuthDisplays() {
  const user = getUser();
  const els = document.querySelectorAll('.auth-only');
  const nonEls = document.querySelectorAll('.no-auth');
  
  if (user.isLoggedIn) {
    els.forEach(el => el.style.display = '');
    nonEls.forEach(el => el.style.display = 'none');
    
    const names = document.querySelectorAll('.user-name-display');
    names.forEach(n => n.innerText = user.name);
  } else {
    els.forEach(el => el.style.display = 'none');
    nonEls.forEach(el => el.style.display = '');
  }
}

function openWhatsAppSupport() {
  window.open('https://wa.me/919059292300', '_blank');
}

function openFarmerWhatsApp(farmerPhone, crop) {
  const message = `నమస్కారం! KisanVaani లో మీ ${crop} జాబితా చూశాను. మాట్లాడవచ్చా?`;
  window.open(`https://wa.me/91${farmerPhone}?text=${encodeURIComponent(message)}`, '_blank');
}

</script>

<script>
// Embedded weather.js
// js/weather.js

const WEATHER_CODES = {
  0:'☀️', 1:'🌤️', 2:'⛅', 3:'☁️',
  45:'🌫️', 48:'🌫️', 51:'🌦️', 53:'🌦️',
  61:'🌧️', 63:'🌧️', 65:'🌧️',
  71:'❄️', 73:'❄️', 75:'❄️',
  80:'⛈️', 81:'⛈️', 95:'⛈️', 99:'🌩️'
};

const WEATHER_TE = {
  0:'స్పష్టమైన ఆకాశం', 1:'దాదాపు స్పష్టంగా',
  2:'పాక్షికంగా మేఘావృతం', 3:'మేఘావృతం',
  45:'పొగమంచు', 61:'తేలికపాటి వర్షం',
  63:'మధ్యస్థ వర్షం', 65:'భారీ వర్షం',
  80:'వర్షపు జల్లులు', 95:'ఉరుముల వర్షం'
};

async function fetchWeather() {
  try {
    const url = 'https://api.open-meteo.com/v1/forecast' +
      '?latitude=17.2473&longitude=80.1514' +
      '&current=temperature_2m,relative_humidity_2m,' +
      'wind_speed_10m,precipitation,weather_code,' +
      'apparent_temperature,uv_index,surface_pressure' +
      '&daily=temperature_2m_max,temperature_2m_min,' +
      'precipitation_sum,weather_code,sunrise,sunset' +
      '&timezone=Asia%2FKolkata&forecast_days=7';
    const res = await fetch(url);
    const data = await res.json();
    if(window.renderWeather) renderWeather(data);
    localStorage.setItem('kv_weather', JSON.stringify(data));
    localStorage.setItem('kv_weather_time', Date.now().toString());
  } catch(e) {
    const cached = localStorage.getItem('kv_weather');
    if (cached) {
      if(window.renderWeather) renderWeather(JSON.parse(cached));
    }
    else {
      if(window.renderFallbackWeather) renderFallbackWeather();
    }
  }
}

function renderFallbackWeather() {
  const month = new Date().getMonth();
  const temps = [22,25,30,36,39,34,30,29,29,28,25,22];
  const fallback = {
    current: {
      temperature_2m: temps[month],
      relative_humidity_2m: 65,
      wind_speed_10m: 12,
      precipitation: 0,
      weather_code: 1,
      apparent_temperature: temps[month] + 2,
      uv_index: 6
    },
    daily: {
      temperature_2m_max: [temps[month]+3,temps[month]+2,
        temps[month]+4,temps[month]+1,temps[month]+3,
        temps[month]+2,temps[month]+4],
      temperature_2m_min: [temps[month]-4,temps[month]-3,
        temps[month]-5,temps[month]-4,temps[month]-3,
        temps[month]-4,temps[month]-5],
      precipitation_sum: [0,2,0,5,0,0,3],
      weather_code: [1,61,1,63,1,2,61],
      sunrise: ['06:10','06:11','06:09','06:12','06:10','06:11','06:09'],
      sunset: ['18:20','18:21','18:19','18:22','18:20','18:21','18:19']
    }
  };
  if(window.renderWeather) renderWeather(fallback);
}

function updateClock() {
  const clockEl = document.getElementById('live-clock');
  const dateEl = document.getElementById('live-date');
  if(!clockEl || !dateEl) return;
  
  const now = new Date();
  const days = ['ఆదివారం','సోమవారం','మంగళవారం','బుధవారం',
                'గురువారం','శుక్రవారం','శనివారం'];
  const months = ['జనవరి','ఫిబ్రవరి','మార్చి','ఏప్రిల్','మే',
                  'జూన్','జులై','ఆగస్టు','సెప్టెంబర్',
                  'అక్టోబర్','నవంబర్','డిసెంబర్'];
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  
  clockEl.textContent = `${h}:${m}:${s}`;
  dateEl.textContent = `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
}

document.addEventListener('DOMContentLoaded', () => {
    setInterval(updateClock, 1000);
    updateClock();
    
    // Auto-fetch weather
    setInterval(fetchWeather, 60000);
    fetchWeather();
});

</script>
