<!DOCTYPE html>
<html lang="te">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KisanVaani - Mandi Prices</title>
  
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#1B4332">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">

  <link rel="stylesheet" href="./css/style.css">
  <script src="./js/app.js"></script>
  <script src="./js/mandi.js"></script>
</head>
<body>
  <nav class="navbar">
    <div class="brand">🌾 మండి ధరలు</div>
    <a href="javascript:history.back()" class="btn btn-outline" style="border-color:white; color:white; padding:4px 12px;">Back</a>
  </nav>

  <div class="container" style="margin-top:20px;">
    
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
      <h2>ఖమ్మం మండి ధరలు</h2>
      <div>
        <span style="font-size:12px; color:var(--text-muted);">కడపటి నవీకరణ: <br><span id="mandi-time">ఇప్పుడే</span></span>
      </div>
    </div>

    <!-- Data.gov.in credits -->
    <div style="background:var(--bg-color); padding:12px; border-radius:8px; margin-bottom:24px; display:flex; gap:12px; align-items:center;">
      <span style="font-size:24px;">📊</span>
      <p style="font-size:13px; color:var(--text-muted); margin:0;">
        భారత ప్రభుత్వ <a href="https://data.gov.in/" target="_blank" style="color:var(--primary); font-weight:bold;">Data.gov.in</a> Open API నుండి సేకరించబడింది.
      </p>
    </div>

    <div id="mandi-prices-container" class="grid-2">
      <div class="card" style="grid-column: span 2; text-align:center;">లోడ్ అవుతోంది...</div>
    </div>

  </div>

  <button class="fab-whatsapp" onclick="window.open('https://wa.me/919059292300', '_blank')">💬</button>

  <script>
    window.renderPrices = function(prices, cached) {
      if(cached) {
        document.getElementById('mandi-time').innerText = 'కాష్ చేయబడింది';
      }
      
      const container = document.getElementById('mandi-prices-container');
      
      if(!prices || prices.length === 0) {
        container.innerHTML = `<div class="card" style="grid-column: span 2; text-align:center; color:var(--danger)">ధరలు అందుబాటులో లేవు</div>`;
        return;
      }
      
      container.innerHTML = prices.map(p => {
        const isUp = p.change >= 0;
        return `
          <div class="card" style="padding:20px;">
            <div style="display:flex; justify-content:space-between; align-items:flex-start;">
              <div style="display:flex; flex-direction:column;">
                <span style="font-size:32px; margin-bottom:8px;">${p.emoji}</span>
                <span style="font-weight:800; font-size:18px;">${p.cropTe}</span>
                <span style="font-size:12px; color:var(--text-muted);">${p.market || 'ఖమ్మం'}</span>
              </div>
              <div style="text-align:right;">
                <div style="color:var(--primary); font-weight:900; font-size:22px;">₹${p.modal}</div>
                <div style="font-size:13px; color:${isUp ? 'var(--success)' : 'var(--danger)'}; font-weight:bold; margin-top:4px;">
                  ${isUp ? '↑' : '↓'} ₹${Math.abs(p.change)}
                </div>
              </div>
            </div>
            
            <div style="margin-top:16px; display:flex; justify-content:space-between; background:var(--bg-color); border-radius:8px; padding:12px;">
              <div style="text-align:center;">
                <div style="font-size:11px; color:var(--text-muted);">కనిష్ట ధర</div>
                <div style="font-weight:700; font-size:14px;">₹${p.min}</div>
              </div>
              <div style="text-align:center;">
                <div style="font-size:11px; color:var(--text-muted);">గరిష్ట ధర</div>
                <div style="font-weight:700; font-size:14px;">₹${p.max}</div>
              </div>
            </div>
          </div>
        `;
      }).join('');
    };
  </script>

  <script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
  }
  </script>
</body>
</html>
