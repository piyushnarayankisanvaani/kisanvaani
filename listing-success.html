<!DOCTYPE html>
<html lang="te">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KisanVaani - Success</title>
  
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#1B4332">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">

  <link rel="stylesheet" href="./css/style.css">
  <script src="./js/app.js"></script>
</head>
<body style="background:var(--primary); color:white; display:flex; flex-direction:column; min-height:100vh;">
  
  <div class="container" style="flex:1; display:flex; justify-content:center; align-items:center;">
    <div style="text-align:center;">
      <div style="font-size:80px; margin-bottom:16px;">🎉</div>
      <h2 style="font-size:32px; margin-bottom:12px;">అద్భుతం!</h2>
      <p style="font-size:18px; opacity:0.9; margin-bottom:30px;">మీ పంట జాబితా విజయవంతంగా ప్రచురించబడింది. కొనుగోలుదారులు వాట్సాప్ ద్వారా మిమ్మల్ని సంప్రదిస్తారు.</p>
      
      <div style="display:flex; flex-direction:column; gap:16px; width:100%; max-width:400px; margin:0 auto;">
        <button onclick="shareListing()" class="btn btn-secondary" style="height:56px; font-size:18px;">
          <span style="font-size:24px; margin-right:8px;">📱</span> షేర్ చేయండి
        </button>
        <button onclick="window.location.href='farmer-dashboard.html'" class="btn btn-outline" style="border-color:white; color:white; height:56px; font-size:18px;">
          హోమ్ పేజీ
        </button>
      </div>
    </div>
  </div>

  <script>
    function shareListing() {
      // In a real app we would get the ID from local storage or URL
      const text = "నమస్కారం! KisanVaani లో నా కొత్త పంట జాబితా చూడండి: " + window.location.origin + "/marketplace.html";
      window.open('https://wa.me/?text=' + encodeURIComponent(text));
    }
  </script>

  <script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
  }
  </script>
</body>
</html>
