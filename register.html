<!DOCTYPE html>
<html lang="te">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KisanVaani - Register</title>
  
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#1B4332">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  
  <link rel="stylesheet" href="./css/style.css">
  <script src="./js/app.js"></script>
</head>
<body>
  <nav class="navbar">
    <div class="brand">🌾 KisanVaani</div>
    <a href="./index.html" class="btn btn-outline" style="border-color:white; color:white; padding:4px 12px;">Back</a>
  </nav>

  <div class="container" style="max-width: 500px; margin-top: 40px;">
    <div class="card">
      <h2 style="margin-bottom: 20px; text-align: center;">ఖాతా సృష్టించండి</h2>
      
      <form id="register-form">
        <div class="form-group">
          <label>పేరు</label>
          <input type="text" id="reg-name" class="form-control" required placeholder="మీ పేరు">
        </div>
        <div class="form-group">
          <label>ఫోన్ నంబర్</label>
          <input type="tel" id="reg-phone" class="form-control" required placeholder="10 అంకెల ఫోన్ నంబర్" pattern="[0-9]{10}">
        </div>
        <div class="form-group">
          <label>గ్రామం / ప్రాంతం</label>
          <input type="text" id="reg-village" class="form-control" required placeholder="ఉదా: ఖమ్మం రూరల్">
        </div>
        <div class="form-group">
          <label>ఖాతా రకం</label>
          <select id="reg-type" class="form-control">
            <option value="farmer">రైతు (పంట అమ్మడానికి)</option>
            <option value="buyer">కొనుగోలుదారు (పంట కొనడానికి)</option>
          </select>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">నమోదు చేసుకోండి</button>
      </form>
      <p style="text-align: center; margin-top: 20px;">
        ఇప్పటికే ఖాతా ఉందా? <a href="./login.html" style="color: var(--primary); font-weight: bold;">లాగిన్ అవ్వండి</a>
      </p>
    </div>
  </div>

  <script>
    document.getElementById('register-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const type = document.getElementById('reg-type').value;
      const name = document.getElementById('reg-name').value;
      const phone = document.getElementById('reg-phone').value;
      const village = document.getElementById('reg-village').value;
      
      loginUser(phone, type, name, village);
      
      const urlParams = new URLSearchParams(window.location.search);
      const redirect = urlParams.get('redirect');
      
      if(redirect) {
         window.location.href = decodeURIComponent(redirect);
      } else if (type === 'farmer') {
         window.location.href = 'farmer-dashboard.html';
      } else {
         window.location.href = 'buyer-dashboard.html';
      }
    });

    const urlParams = new URLSearchParams(window.location.search);
    const type = urlParams.get('type');
    if (type) document.getElementById('reg-type').value = type;
  </script>
  
  <script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
  }
  </script>
</body>
</html>
